<main class="main-content">
    <div id="view-cancelar-pedido-tela" class="page-view active" style="max-width: 500px; margin: 40px auto; padding: 30px; background: #f6eeee; border: 1px solid #e0d6d6; border-radius: 12px;">
        <h3 style="color: #a83232; text-align: center; margin-bottom: 15px; font-size: 1.4rem;">Cancelar Pedido</h3>
        <p style="color: #727e5f; font-size: 0.9rem; margin-bottom: 20px; text-align: center;">Insira a identificação do pedido e o motivo da interrupção para estorno e atualização no banco.</p>

        <div class="form-group" style="margin-bottom: 15px;">
            <label style="color:#4e583d; font-weight:bold;">ID Completo do Pedido *</label>
            <input type="text" id="cancel-pedido-id" placeholder="Digite o ID do pedido gerado pelo Firebase" style="width:100%; padding:10px; border:1px solid #c8b9b9; border-radius:4px;">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="color:#4e583d; font-weight:bold;">Motivo do Cancelamento *</label>
            <textarea id="cancel-pedido-motivo" placeholder="Descreva brevemente o motivo (Ex: Arrependimento do cliente, falta de insumo, etc.)" style="width:100%; padding:10px; border:1px solid #c8b9b9; border-radius:4px; height:80px; resize:none; font-family:inherit;"></textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button id="btn-abortar-cancelamento" style="flex:1; background:#c8b9b9; color:#4a5d23; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">VOLTAR</button>
            <button id="btn-confirmar-cancelamento-banco" style="flex:1; background:#a83232; color:white; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">CONFIRMAR CANCELAMENTO</button>
        </div>
    </div>
</main>
