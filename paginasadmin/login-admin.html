<main class="main-content">
    <div id="view-login-admin" class="page-view active" style="max-width: 450px; margin: 40px auto; padding: 30px; background: #f6eeee; border: 1px solid #e0d6d6; border-radius: 12px;">
        <h3 style="color: #4a5d23; text-align: center; margin-bottom: 20px; font-size: 1.6rem;">Painel Administrativo</h3>

        <div class="form-group" style="margin-bottom: 15px;">

        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="color: #4e583d; font-weight: 500;">Senha de Acesso *</label>

        </div>

        <button class="btn-submit" id="btn-entrar-admin" style="width: 100%; background: #727e5f; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 15px;">AUTENTICAR NO PAINEL</button>

        <div style="text-align: center; font-size: 0.9rem;">
            <a href="#" id="link-esqueci-admin" style="color: #727e5f; text-decoration: none;">Esqueceu sua senha corporativa?</a>
