<main class="main-content">
    <div id="view-cadastro-func" class="page-view active" style="max-width: 500px; margin: 40px auto; padding: 30px; background: #f6eeee; border: 1px solid #e0d6d6; border-radius: 12px;">
        <h3 style="color: #4a5d23; text-align: center; margin-bottom: 20px; font-size: 1.5rem;">Cadastrar Novo Colaborador</h3>

        <div class="form-group" style="margin-bottom: 15px;">
            <label>Nome Completo *</label>
            <input type="text" id="cad-func-nome" placeholder="Nome do funcionário" style="width:100%; padding:8px; border:1px solid #c8b9b9; border-radius:4px;">
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>E-mail Corporativo *</label>
            <input type="email" id="cad-func-email" placeholder="nome@flowerkids.com" style="width:100%; padding:8px; border:1px solid #c8b9b9; border-radius:4px;">
        </div>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Cargo / Função *</label>
            <input type="text" id="cad-func-cargo" placeholder="Ex: Florista, Logística" style="width:100%; padding:8px; border:1px solid #c8b9b9; border-radius:4px;">
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
            <label>Senha Provisória de Acesso *</label>
            <input type="password" id="cad-func-senha" placeholder="Mínimo 6 caracteres" style="width:100%; padding:8px; border:1px solid #c8b9b9; border-radius:4px;">
        </div>

        <button class="btn-submit" id="btn-salvar-cadastro-func" style="width:100%; background:#727e5f; color:white; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">REGISTRAR COLABORADOR</button>
    </div>
</main>
