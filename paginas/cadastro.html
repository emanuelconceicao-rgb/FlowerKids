<div class="auth-container" style="max-width: 400px; margin: 40px auto; padding: 30px; text-align: center; border: 1px solid #ebdcdc; border-radius: 8px; background: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

    <h2 style="color: #4a5d23; margin-bottom: 10px;">Criar Conta</h2>
    <p style="color: #727e5f; margin-bottom: 25px;">Junte-se à Flower Kids! 🌸</p>

    <div style="margin-bottom: 15px; text-align: left;">
        <label style="display: block; color: #4a5d23; margin-bottom: 5px; font-weight: bold;">Nome Completo</label>
        <input type="text" id="cadastro-nome" placeholder="Digite o seu nome" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
    </div>

    <div style="margin-bottom: 15px; text-align: left;">
        <label style="display: block; color: #4a5d23; margin-bottom: 5px; font-weight: bold;">E-mail</label>
        <input type="email" id="cadastro-email" placeholder="seu@email.com" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
    </div>

    <div style="margin-bottom: 25px; text-align: left;">
        <label style="display: block; color: #4a5d23; margin-bottom: 5px; font-weight: bold;">Senha</label>
        <input type="password" id="cadastro-senha" placeholder="Mínimo 6 caracteres" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px;">
    </div>

    <button id="btn-finalizar-cadastro" style="width: 100%; padding: 14px; background: #727e5f; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s;">
        FINALIZAR REGISTO
    </button>

    <p style="margin-top: 20px; color: #666; font-size: 14px;">
        Já tem uma conta?
        <a href="#" onclick="carregarPagina('login')" style="color: #4a5d23; font-weight: bold; text-decoration: none;">Fazer Login</a>
    </p>

</div>
